<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/static/task.png" type="image/x-icon" />
    <title>Project Details</title>

    <link rel="stylesheet" href="/static/style.css" />
  </head>

  <body>
    <div class="sidebar">
      <h2>TaskFlow</h2>

      <a href="/">Dashboard</a>

      <a href="/projects-page">Projects</a>

      <a href="/tasks-page">Tasks</a>

      <a href="/users-page">Users</a>

      <a href="/reports-page">Reports</a>

      <a href="/logout">Logout</a>
    </div>

    <div class="main-content">
      <h1 id="projectTitle">Project Details</h1>

      <h3>
        Progress:
        <span id="progressText"> 0% </span>
      </h3>

      <div class="progress-bar">
        <div id="progressFill" class="progress-fill"></div>
      </div>

      <br />

      <p id="projectStatus"></p>

      <hr />

      <h2>Tasks</h2>
      <h3>
        Total Tasks:
        <span id="taskCount"> 0 </span>
      </h3>

      <div id="tasksContainer"></div>

      <br />

      <button onclick="showTaskForm()">Add Task</button>
      <input
        type="file"
        placeholder="Choose file"
        title="Upload file"
        onchange="uploadFile(this.files[0])"
      />

      <div id="taskForm" style="display: none">
        <form id="createTaskForm">
          <input type="text" id="taskName" placeholder="Task Name" required />

          <textarea id="description" placeholder="Description"> </textarea>

          <input
            type="email"
            id="assignedTo"
            placeholder="Assigned To"
            required
          />

          <input type="date" id="deadline" required />

          <button type="submit">Create Task</button>
        </form>
      </div>
    </div>

    <script src="/static/project-details.js"></script>
  </body>
</html>
