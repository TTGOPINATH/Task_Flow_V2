<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/static/task.png" type="image/x-icon" />
    <title>Projects</title>

    <link rel="stylesheet" href="/static/style.css" />
  </head>

  <body>
    <div class="sidebar">
      <h2>TaskFlow</h2>

      <a href="/">Dashboard</a>

      <a href="/projects-page">Projects</a>

      <a href="/tasks-page">Tasks</a>

      <a href="/users-page">Users</a>

      <a href="/reports-page">Reports</a>

      <a href="/logout">Logout</a>
    </div>

    <div class="main-content">
      <h1>Projects</h1>

      <div class="card">
        <button onclick="showProjectForm()">Create Project</button>

        <h3 style="margin-top: 20px">
          Total Projects :

          <span id="projectCount"> 0 </span>
        </h3>
        <button onclick="editProject()">Edit</button>
      </div>

      <br />

      <div id="projectForm" style="display: none">
        <form id="createProjectForm">
          <input
            type="number"
            id="projectId"
            placeholder="Project ID"
            required
          />

          <input
            type="text"
            id="projectName"
            placeholder="Project Name"
            required
          />

          <textarea
            id="description"
            placeholder="Project Description"
          ></textarea>

          <input type="date" id="createdOn" required />

          <input type="date" id="deadline" required />

          <button type="submit">Save Project</button>
        </form>
      </div>

      <br />

      <h2>Active Projects</h2>

      <div id="projectsContainer"></div>

      <br /><br />

      <h2>Completed Projects</h2>

      <div id="completedProjects"></div>
    </div>

    <script src="/static/projects.js"></script>
  </body>
</html>
