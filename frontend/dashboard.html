<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="icon" href="/static/task.png" type="image/x-icon">
    <title>Dashboard</title>

    <link rel="stylesheet" href="/static/style.css" />
  </head>

  <body>
    <div class="sidebar">
      <h2>TaskFlow</h2>

      <a href="/">Dashboard</a>

<a href="/projects-page">Projects</a>

<a href="/tasks-page">Tasks</a>

<a href="/users-page">Users</a>

<a href="/reports-page">Reports</a>

<a href="/logout">Logout</a>
    </div>

    <div class="main-content">
      <div class="profile-section">
        <div class="avatar">
          <span id="userInitial"></span>
        </div>

        <div>
          <h4 id="username"></h4>
          <p id="role"></p>
        </div>
      </div>

      <h1>Dashboard</h1>

      <div class="dashboard-grid">
        <div class="card">
          <h2 id="activeProjects">0</h2>
          <p>Active Projects</p>
        </div>

        <div class="card">
          <h2 id="completedProjects">0</h2>
          <p>Completed Projects</p>
        </div>

        <div class="card">
          <h2 id="totalTasks">0</h2>
          <p>Total Tasks</p>
        </div>

        <div class="card">
          <h2 id="completedTasks">0</h2>
          <p>Completed Tasks</p>
        </div>
      </div>

     <div class="dashboard-sections">

    <div class="section-card">

        <h2>
            Recent Projects
        </h2>

        <div id="recentProjects"></div>

    </div>

    <div class="section-card">

        <h2>
            Recent Tasks
        </h2>

        <div id="recentTasks"></div>

    </div>

</div>
      </div>
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
