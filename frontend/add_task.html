<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="/static/task.png" type="image/x-icon">
    <title>Add Task</title>
  </head>
  <body>
    <div class="sidebar">
      <h2>TaskFlow</h2>

      <a href="/dashboard">Dashboard</a>

      <a href="/projects">Projects</a>

      <a href="/tasks">Tasks</a>

      <a href="/users">Users</a>

      <a href="/reports">Reports</a>

      <a href="/settings">Settings</a>

      <a href="/logout">Logout</a>
    </div>
    <form id="taskForm">
      <input type="number" id="projectId" placeholder="Project ID" required />

      <input type="text" id="taskName" placeholder="Task Name" required />

      <textarea id="description" placeholder="Task Description"></textarea>

      <label for="assignedTo">Assigned To:</label>
      <select id="assignedTo" title="Assign task to employee">
        <option value="">Select Employee</option>
      </select>

      <label for="deadline">Deadline:</label>
      <input type="date" id="deadline" title="Set task deadline" />

      <button type="submit">Create Task</button>
    </form>

    <script src="/static/app.js"></script>
  </body>
</html>
